<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash-Flow | Premium Salary & Expense Tracker</title>
    <!-- Google Fonts -->
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cash-Flow</h1>
            <p>Smart insights into your financial health</p>
        </header>

        <!-- Summary Stats -->
        <div class="stats-grid">
            <div class="stat-card stat-salary">
                <div class="stat-label">Total Salary</div>
                <div class="stat-value" id="display-salary">₹0.00</div>
            </div>
            <div class="stat-card stat-balance">
                <div class="stat-label">Remaining Balance</div>
                <div class="stat-value" id="display-balance">₹0.00</div>
            </div>
            <div class="stat-card stat-expenses">
                <div class="stat-label">Total Expenses</div>
                <div class="stat-value" id="display-expenses">₹0.00</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Left Column: Forms -->
            <div class="left-col">
                <!-- Salary Input Card -->
                <div class="card" style="margin-bottom: 2rem;">
                    <div class="card-title">
                        <i class="fa-solid fa-wallet" style="color: var(--success);"></i>
                        Set Monthly Salary
                    </div>
                    <form id="salary-form">
                        <div class="form-group">
                            <label for="salary-input">Total Salary Amount</label>
                            <input type="number" id="salary-input" placeholder="e.g. 5000" min="0" step="0.01">
                        </div>
                        <button type="submit">Update Salary</button>
                    </form>
                </div>

                <!-- Expense Input Card -->
                <div class="card">
                    <div class="card-title">
                        <i class="fa-solid fa-receipt" style="color: var(--primary);"></i>
                        Add New Expense
                    </div>
                    <form id="expense-form">
                        <div class="form-group">
                            <label for="expense-name">Expense Name</label>
                            <input type="text" id="expense-name" placeholder="e.g. Groceries">
                        </div>
                        <div class="form-group">
                            <label for="expense-amount">Amount</label>
                            <input type="number" id="expense-amount" placeholder="e.g. 150" min="0" step="0.01">
                        </div>
                        <button type="submit">
                            <i class="fa-solid fa-plus"></i>
                            Add Expense
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Visualization & List -->
            <div class="right-col">
                <!-- Visualization Card -->
                <div class="card" style="margin-bottom: 2rem;">
                    <div class="card-title">
                        <i class="fa-solid fa-chart-pie" style="color: var(--primary);"></i>
                        Spending Overview
                    </div>
                    <div class="chart-container">
                        <canvas id="balanceChart"></canvas>
                    </div>
                </div>

                <!-- Expense List Card -->
                <div class="card">
                    <div class="card-title">
                        <i class="fa-solid fa-list-ul" style="color: var(--primary);"></i>
                        Recent Expenses
                    </div>
                    <div id="expense-list-container" class="expense-list">
                        <!-- Expenses injected here by JS -->
                        <p style="color: var(--text-muted); text-align: center; margin-top: 1rem;" id="no-expenses-msg">No expenses added yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
